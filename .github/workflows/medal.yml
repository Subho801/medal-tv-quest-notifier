name: Medal TV Quest Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-medal-notifier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python medal.py

      - name: Commit posted quests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add posted_quests.json
          git diff --cached --quiet || git commit -m "Update posted quests"
          git push
